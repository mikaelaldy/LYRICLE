kind = "web"
previewPath = "/"
title = "Lyricle"
version = "1.0.0"
id = "artifacts/lyricle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23036

[services.development]
run = "pnpm --filter @workspace/lyricle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lyricle", "run", "build" ]
publicDir = "artifacts/lyricle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23036"
BASE_PATH = "/"
